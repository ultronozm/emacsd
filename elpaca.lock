 (pdf-tools :source "elpaca-menu-lock-file" :recipe
            (:source nil :package "pdf-tools" :id pdf-tools :host
                     github :repo "vedang/pdf-tools" :depth nil
                     :inherit nil :post-build
                     (let*
                         ((repo default-directory)
                          (pkg
                           (file-name-nondirectory
                            (directory-file-name repo)))
                          (build
                           (expand-file-name
                            (file-name-as-directory pkg)
                            elpaca-builds-directory))
                          (src (expand-file-name "server" repo))
                          (dst (expand-file-name "build/server" build)))
                       (when (file-directory-p src)
                         (when (file-exists-p dst)
                           (cond
                            ((file-symlink-p dst) (delete-file dst))
                            ((file-directory-p dst)
                             (delete-directory dst t))
                            (t (delete-file dst))))
                         (make-directory (file-name-directory dst) t)
                         (copy-directory src dst t t t)
                         (when (executable-find "autoreconf")
                           (let ((default-directory dst))
                             (unless
                                 (zerop
                                  (call-process "autoreconf" nil
                                                "*elpaca pdf-tools autoreconf*"
                                                t "-i"))
                               (error
                                "pdf-tools: autoreconf failed in %s"
                                default-directory))))))
                     :type git :ref
                     "041cfaf31643fcd60403feedb002dd3613d32275"))
